# ===========================================
# Secret 模板
# 知识点：敏感信息管理、base64 编码
# 注意：stringData 中的值 K8S 会自动 base64 编码
# ===========================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "training-app.fullname" . }}-secret
  labels:
    {{- include "training-app.labels" . | nindent 4 }}
type: Opaque
stringData:
{{- range $key, $val := .Values.secrets }}
  {{ $key }}: {{ $val | quote }}
{{- end }}
